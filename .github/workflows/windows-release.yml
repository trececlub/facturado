name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --windowed --name FacturadoStickerStudio `
            --add-data "config;config" `
            --add-data "templates;templates" `
            --add-data "assets;assets" `
            main.py

      - name: Prepare package
        shell: pwsh
        run: |
          Compress-Archive -Path dist/FacturadoStickerStudio/* -DestinationPath FacturadoStickerStudio-windows.zip

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\FacturadoStickerStudio.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FacturadoStickerStudio-windows
          path: |
            FacturadoStickerStudio-windows.zip
            installer_output/FacturadoStickerStudio-Setup.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FacturadoStickerStudio-windows.zip
            installer_output/FacturadoStickerStudio-Setup.exe
          generate_release_notes: true

      - name: Update rolling latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          prerelease: true
          make_latest: false
          files: |
            FacturadoStickerStudio-windows.zip
            installer_output/FacturadoStickerStudio-Setup.exe
